# Fly.io config for Milady API (ICP Launchpad)
# Deploy: fly deploy
# Secrets: fly secrets set MILADY_ALLOWED_ORIGINS="https://q2k6b-yiaaa-aaaau-afpna-cai.icp0.io"

app = "milady-api-icp"

[build]

[env]
  PORT = "3000"
  AGENT_NAME = "Milady"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
